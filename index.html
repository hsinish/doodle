<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>♣️ Doodle - 撲克牌畫畫題目產生器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 引入手寫字體 Permanent Marker */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;700&family=Noto+Serif+TC:wght@900&family=Permanent+Marker&display=swap');

        :root {
            --bg-color: #e5e5e5;
            --card-bg: #ffffff;
            --item-bg: #f8f8f8;
            --item-hover: #f0f0f0;
            --poker-red: #d40000;
        }

        body {
            background-color: var(--bg-color);
            color: #1a1a1a;
            font-family: "PingFang TC", "Microsoft JhengHei", "Noto Sans JP", sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .poker-serif {
            font-family: 'Noto Serif TC', serif;
        }

        /* 手寫風格標題字體 */
        .handwritten-title {
            font-family: 'Permanent Marker', cursive;
        }

        .card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--card-bg);
            /* 微調最小高度，確保在平板上也能一次看完 */
            min-height: 420px; 
            position: relative;
            overflow: hidden;
            padding-left: 3rem !important;
            padding-right: 3rem !important;
        }

        @media (min-height: 800px) {
            .card { min-height: 480px; }
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.1);
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .text-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            line-height: 1.1;
        }

        .ch-text {
            font-weight: 700;
            font-size: clamp(0.85rem, 1.1vw, 1.05rem);
            color: #1a1a1a;
            margin-bottom: 1px;
        }

        .jp-text {
            font-family: 'Noto Sans JP', sans-serif;
            font-weight: 300;
            font-size: clamp(0.75rem, 1vw, 0.9rem);
            color: #4b5563;
        }

        .prompt-item {
            background-color: var(--item-bg);
            padding: 8px 12px; 
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 10px;
            margin-bottom: 4px; /* 稍微縮小間距 */
            transition: background-color 0.2s;
            width: 100%;
        }
        
        .prompt-item:hover {
            background-color: var(--item-hover);
        }

        .heart-red {
            color: var(--poker-red);
        }

        .btn-refresh {
            background-color: #1a1a1a;
            color: #ffffff;
            transition: all 0.2s;
        }
        .btn-refresh:hover {
            background-color: #404040;
        }

        .club-grid {
            width: 32px;
            height: 42px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            flex-shrink: 0;
            background: #ffffff;
            border-radius: 4px;
            padding: 2px;
        }
        .club-symbol {
            font-size: 9px;
            color: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .poker-corner {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 0.85;
            font-weight: 900;
            z-index: 10;
        }
        .corner-top { top: 8px; left: 8px; }
        .corner-bottom { 
            bottom: 8px; 
            right: 8px; 
            transform: rotate(180deg); 
        }

        .options-wrapper {
            margin-top: 1rem;
            margin-bottom: 1rem;
            width: 100%;
            padding: 0 0.5rem;
        }

        @media (max-width: 1280px) {
            .card { 
                padding-left: 2.2rem !important; 
                padding-right: 2.2rem !important; 
            }
            .options-wrapper { padding: 0; }
        }
    </style>
</head>
<body class="p-4 lg:p-8">

    <div class="max-w-[1920px] mx-auto">
        <header class="flex flex-row justify-between items-center mb-6">
            <!-- 縮小標題字體大小，從 text-4xl/6xl 改為 text-2xl/4xl -->
            <h1 class="handwritten-title text-2xl md:text-4xl text-black tracking-widest">
                ♣ DOODLE ♥
            </h1>
            <button 
                onclick="refreshAll()"
                class="btn-refresh font-bold py-2 px-6 rounded-full transform active:scale-95 shadow-md text-xs md:text-sm"
            >
                重置全部
            </button>
        </header>

        <!-- 調整 Grid 佈局：md(平板) 設為 3 欄，xl(桌面) 設為 6 欄 -->
        <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-6 gap-3 lg:gap-4">
            <!-- 由 JS 生成 -->
        </div>
    </div>

    <script>
        const clubLayouts = {
            1: [4],
            2: [1, 7],
            3: [1, 4, 7],
            4: [0, 2, 6, 8],
            5: [0, 2, 4, 6, 8],
            6: [0, 2, 3, 5, 6, 8]
        };

        const heartIds = ["A", "2", "3", "4", "5", "6"];

        const config = [
            { id: heartIds[0], pool: [{ ch: "西瓜", jp: "スイカ" }, { ch: "城堡", jp: "おしろ" }, { ch: "漢堡", jp: "ハンバーガー" }, { ch: "拉麵", jp: "ラーメン" }, { ch: "爆米花", jp: "ポップコーン" }, { ch: "壽司", jp: "スシ" }, { ch: "草莓", jp: "イチゴ" }, { ch: "披薩", jp: "ピザ" }, { ch: "蛋糕", jp: "ケーキ" }, { ch: "甜甜圈", jp: "ドーナツ" }] },
            { id: heartIds[1], pool: [{ ch: "怪獸", jp: "モンスター" }, { ch: "星星", jp: "ほし" }, { ch: "月亮", jp: "つき" }, { ch: "巴士", jp: "バス" }, { ch: "土星", jp: "どせい" }, { ch: "噴泉", jp: "ふんすい" }, { ch: "彗星", jp: "すいせい" }, { ch: "黑洞", jp: "ブラックホール" }, { ch: "披風", jp: "マント" }, { ch: "鋼琴", jp: "ピアノ" }] },
            { id: heartIds[2], pool: [{ ch: "獨角獸", jp: "ユニコーン" }, { ch: "鱷魚", jp: "ワニ" }, { ch: "恐龍", jp: "きょうりゅう" }, { ch: "貓咪", jp: "ねこ" }, { ch: "小狗", jp: "いぬ" }, { ch: "大象", jp: "ぞう" }, { ch: "變色龍", jp: "カメレオン" }, { ch: "企鵝", jp: "ペンギン" }, { ch: "河馬", jp: "カバ" }, { ch: "長頸鹿", jp: "キリン" }] },
            { id: heartIds[3], pool: [{ ch: "花朵", jp: "はな" }, { ch: "山脈", jp: "やま" }, { ch: "雨滴", jp: "あめ" }, { ch: "迷宮", jp: "めいろ" }, { ch: "森林", jp: "もり" }, { ch: "蘑菇", jp: "きのこ" }, { ch: "太陽", jp: "たいよう" }, { ch: "糖果", jp: "キャンディ" }, { ch: "雲朵", jp: "くも" }, { ch: "樹枝", jp: "えだ" }] },
            { id: heartIds[4], pool: [{ ch: "鬧鐘", jp: "とけい" }, { ch: "鞋子", jp: "くつ" }, { ch: "鉛筆", jp: "えんぴつ" }, { ch: "雨傘", jp: "かさ" }, { ch: "書本", jp: "ほん" }, { ch: "牙刷", jp: "ハブラシ" }, { ch: "電視", jp: "テレビ" }, { ch: "湯勺", jp: "スプーン" }, { ch: "眼鏡", jp: "めがね" }, { ch: "氣球", jp: "ふうせん" }] },
            { id: heartIds[5], pool: [{ ch: "女王", jp: "じょおう" }, { ch: "帽子", jp: "ぼうし" }, { ch: "背包", jp: "リュック" }, { ch: "手套", jp: "てぶくろ" }, { ch: "頭盔", jp: "ヘルメット" }, { ch: "寶箱", jp: "たからばこ" }, { ch: "靴子", jp: "ブーツ" }, { ch: "手錶", jp: "うでどけい" }, { ch: "戒指", jp: "ゆびわ" }, { ch: "電筒", jp: "ライト" }] }
        ];

        function getClubBadge(num) {
            const layout = clubLayouts[num];
            let cells = Array(9).fill('');
            layout.forEach(idx => cells[idx] = '♣');
            
            return `
                <div class="club-grid">
                    ${cells.map(cell => `<div class="club-symbol">${cell}</div>`).join('')}
                </div>
            `;
        }

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function generateCard(index) {
            const group = config[index];
            const topics = shuffle([...group.pool]).slice(0, 6);
            
            const card = document.createElement('div');
            card.className = `card rounded-xl fade-in flex flex-col justify-center`;
            card.id = `group-${index}`;

            const cornerHTML = `
                <div class="poker-corner corner-top heart-red">
                    <span class="text-3xl poker-serif font-black">${group.id}</span>
                    <span class="text-xl">♥</span>
                </div>
                <div class="poker-corner corner-bottom heart-red">
                    <span class="text-3xl poker-serif font-black">${group.id}</span>
                    <span class="text-xl">♥</span>
                </div>
            `;

            const refreshBtn = `
                <button 
                    onclick="refreshOne(${index})"
                    class="absolute top-3 right-3 text-gray-200 hover:text-black transition-colors z-20"
                >
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>
            `;

            const list = `
                <div class="options-wrapper flex flex-col space-y-1">
                    ${topics.map((t, i) => `
                        <div class="prompt-item">
                            ${getClubBadge(i + 1)}
                            <div class="text-container">
                                <span class="ch-text">${t.ch}</span>
                                <span class="jp-text">${t.jp}</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;

            card.innerHTML = cornerHTML + refreshBtn + list;
            return card;
        }

        function refreshOne(index) {
            const grid = document.getElementById('grid');
            const oldCard = document.getElementById(`group-${index}`);
            const newCard = generateCard(index);
            grid.replaceChild(newCard, oldCard);
        }

        function refreshAll() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for (let i = 0; i < config.length; i++) {
                grid.appendChild(generateCard(i));
            }
        }

        window.onload = refreshAll;
    </script>
</body>
</html>
